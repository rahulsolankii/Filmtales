<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Filmtales | Let Your Mood Choose Your Movie{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    
    <div class="hero-background" id="globalHeroBg"></div>
    <div class="hero-overlay"></div>

    <div class="container">
        <nav class="navbar">
            <a href="/" class="logo">
                <i class="fas fa-film"></i> Filmtales
            </a>
            <div class="nav-links">
                <a href="/moods" class="nav-link">Mood Selection</a>
                <a href="/admin-login" class="nav-link admin-link" style="opacity: 0.5;"><i class="fas fa-lock"></i></a>
            </div>
        </nav>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer>
            <p>Built for a premium cinematic mood experience.</p>
            <p style="font-size: 0.8rem; opacity: 0.6;">© 2026 Filmtales | All rights reserved</p>
        </footer>
    </div>

    <!-- Global Movie Details Modal (Used in Results page and Landing Page Previews) -->
    <div class="modal" id="movieModal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div class="modal-body" id="modalBody">
                <!-- Movie details will be loaded here dynamically -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="{{ url_for('static', filename='script.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
