<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Filmtales</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        .hero-background {
            filter: blur(15px) brightness(0.4);
        }
        
        .login-container {
            max-width: 420px;
            margin: 60px auto;
            background: rgba(17, 24, 39, 0.7);
            padding: 50px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* Ambient glow behind card */
        .login-container::before {
            content: '';
            position: absolute;
            top: -50px; left: -50px; right: -50px; bottom: -50px;
            background: radial-gradient(circle at center, rgba(110, 231, 183, 0.15), transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        .login-header h2 {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: white;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--mood-calm);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(110, 231, 183, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: white;
            border: none;
            border-radius: 12px;
            color: var(--bg-primary);
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            background: var(--mood-calm);
            box-shadow: 0 10px 20px rgba(110, 231, 183, 0.3);
        }

        #loginError {
            color: #ef4444;
            margin-top: 20px;
            font-size: 0.95rem;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body>
    <div class="hero-background"></div>
    <div class="hero-overlay"></div>

    <div class="container">
        <header>
            <a href="/" style="text-decoration: none;"><h1>Filmtales</h1></a>
            <p class="tagline">Admin Control Panel</p>
        </header>

        <div class="login-container">
            <div class="login-header">
                <h2>Secure Access</h2>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Authenticate</button>
                <div id="loginError">Invalid credentials.</div>
            </form>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, where, addDoc } from "{{ url_for('static', filename='firebase-config.js') }}";

        // Auto-create default admin on app start
        async function ensureDefaultAdmin() {
            try {
                const adminRef = collection(db, "admins");
                const q = query(adminRef, where("username", "==", "Rahul"));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    await addDoc(adminRef, {
                        username: "Rahul",
                        password: "Rahul@123"
                    });
                    console.log("Default admin created successfully.");
                }
            } catch (err) {
                console.error("Error ensuring default admin:", err);
            }
        }

        ensureDefaultAdmin();

        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const adminRef = collection(db, "admins");
                const q = query(adminRef, where("username", "==", username), where("password", "==", password));
                const snapshot = await getDocs(q);

                if (!snapshot.empty) {
                    // Save admin status in session storage
                    sessionStorage.setItem('isAdmin', 'true');
                    sessionStorage.setItem('adminUser', username);
                    window.location.href = '/admin-dashboard';
                } else {
                    loginError.style.display = 'block';
                }
            } catch (err) {
                console.error("Login Error:", err);
            }
        });
    </script>
</body>
</html>
